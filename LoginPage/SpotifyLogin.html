<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        body {
            background: linear-gradient(90deg, rgba(31, 28, 28, 1) 0%, rgba(50, 50, 61, 1) 40%, rgba(81, 83, 92, 1) 100%);
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 2.5vh;

        }

        nav {
            width: 100%;
            height: 8vh;
            background-color: black;
            display: flex;
            align-items: center;
            padding: 12px 0 12px 6px;
        }

        nav div {
            width: 10%;
            height: 10%;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.985em;
        }

        .loginBox {
            background-color: black;
            border: 2px solid red;
            width: 50vmax;
            border-radius: 10px;
            height: 80vmin;
        }
        .loginOptions
        {
            border: 2px solid gray;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .text-size {
            font-weight: 600;
            border-radius: 18px;
            border: 2px solid red;
            width:30%;
            height:4vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>
    <nav>
        <div>
            <img src="logo.svg" alt="">
            <span>Spotify</span>
        </div>
    </nav>
    <main>
        <div class="loginBox">
            <h1>Log in to Spotify</h1>
            <div class="loginOptions">

                <div class="google text-size">
                    <!-- icon -->
                    <span>Continue with Google</span>
                </div>
                <div class="facebook text-size">
                    <!-- icon -->
                    <span>Continue with Facebook</span>
                </div>
                <div class="apple text-size">
                    <!-- icon -->
                    <span>Continue with Apple</span>
                </div>
                <div class="text-size">
                    <span>Continue with phone number</span>
                </div>

            </div>
        </div>
    </main>
</body>

</html>
